<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Car Encyclopedia</title><meta name="description" content="13,000+ cars from around the world — browse by country, maker, and engine size, with photos. Multilingual.">
<link rel="canonical" href="https://ymgtksk-blip.github.io/car-encyclopedia/"><link rel="stylesheet" href="style.css"></head>
<body>
<header>
 <div class="bar" style="margin-top:0">
  <span class="brand">🚗 World Car Encyclopedia</span>
  <select id="lang" class="langsel" aria-label="Language / 言語"><option value="en">English</option><option value="zh">中文</option><option value="hi">हिन्दी</option><option value="es">Español</option><option value="ar">العربية</option><option value="fr">Français</option><option value="pt">Português</option><option value="ru">Русский</option><option value="ja">日本語</option><option value="de">Deutsch</option><option value="ko">한국어</option><option value="it">Italiano</option></select>
 </div>
 <div class="bar">
  <input id="q" class="q" type="search" placeholder="Search…">
  <button id="mfac" class="mobic">▤ Filters</button>
  <span class="count" id="count"></span>
 </div>
</header>
<section class="heroband" id="hero">
 <div class="herobg"></div>
 <div class="herophotos" id="heroBackdrop" aria-hidden="true"></div>
 <div class="heroinner">
  <h1 class="herotitle">🚗 World Car Encyclopedia</h1>
  <p class="herosub" id="herosub">世界のクルマを、12言語で。名車・スーパーカー・JDMまで。</p>
  <div class="stats">
   <div class="stat"><b class="num" id="stCars" data-to="0">0</b><span id="stCarsL">台</span></div>
   <div class="stat"><b class="num" id="stMakers" data-to="0">0</b><span id="stMakersL">メーカー</span></div>
   <div class="stat"><b class="num" id="stLang" data-to="12">0</b><span id="stLangL">言語</span></div>
  </div>
  <div class="herocta">
   <button class="cta primary" id="ctaRandom"><span id="ctaRandomL">🎲 ランダム</span></button>
   <button class="cta" id="ctaSearch"><span id="ctaSearchL">🔍 クルマを探す</span></button>
  </div>
  <div class="showcase" id="showcase"></div>
 </div>
</section>
<div class="layout">
 <aside class="facets" id="facets">
  <div class="fgroup"><h3 id="hCountry">Country</h3><input class="ffilter" id="fcoq" placeholder="filter…"><div class="flist" id="fco"></div></div>
  <div class="fgroup"><h3 id="hMaker">Maker</h3><input class="ffilter" id="fmkq" placeholder="filter…"><div class="flist" id="fmk"></div></div>
  <div class="fgroup"><h3 id="hDisp">Displacement</h3><div class="flist" id="fdc"></div></div>
 </aside>
 <main class="main">
  <div class="chips" id="chips"></div>
  <div class="grid" id="grid"></div>
  <div class="pager" id="pager"></div>
 </main>
</div>
<div id="ov"><div id="ovbox"></div></div>
<script>
const UI={"search": {"en": "Search…", "ja": "検索…"}, "fCountry": {"en": "Country", "ja": "国"}, "fMaker": {"en": "Maker", "ja": "メーカー"}, "fDisp": {"en": "Engine size", "ja": "排気量"}, "results": {"en": "results", "ja": "件"}, "verified": {"en": "Verified", "ja": "検証済み"}, "unverified": {"en": "Unverified", "ja": "未検証"}, "unknown": {"en": "Unknown", "ja": "不明"}, "noData": {"en": "No matches", "ja": "該当なし"}, "prev": {"en": "Prev", "ja": "前へ"}, "next": {"en": "Next", "ja": "次へ"}, "heroSub": {"en": "Cars of the world, in 12 languages — classics, supercars, and JDM icons.", "ja": "世界のクルマを、12言語で。名車・スーパーカー・JDMまで。"}, "heroCtaSearch": {"en": "🔍 Find cars", "ja": "🔍 クルマを探す"}, "heroCtaRandom": {"en": "🎲 Surprise me", "ja": "🎲 ランダム"}, "heroStCars": {"en": "cars", "ja": "台"}, "heroStMakers": {"en": "makers", "ja": "メーカー"}, "heroStLang": {"en": "languages", "ja": "言語"}};
let L="ja",CARS=[],page=0;const PS=48;
const F={co:new Set(),mk:new Set(),dc:new Set(),q:""};
const FB=["en","ja"];
function t(k){return (UI[k]||{})[L]||(UI[k]||{}).en||k;}
function pick(o){if(!o)return "";if(typeof o==="string")return o;if(o[L])return o[L];for(const c of FB){if(o[c])return o[c];}const v=Object.values(o);return v.length?v[0]:"";}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function flag(cc){if(!cc||cc.length!==2)return "🏳️";try{return cc.toUpperCase().replace(/./g,c=>String.fromCodePoint(127397+c.charCodeAt(0)));}catch(e){return "🏳️";}}
let _DN=null,_DNL=null;
function cname(cc){if(!cc)return t("unknown");if(_DNL!==L){try{_DN=new Intl.DisplayNames([L],{type:"region"});}catch(e){_DN=null;}_DNL=L;}try{return _DN?(_DN.of(cc)||cc):cc;}catch(e){return cc;}}
const BUCKETS=["lt1000","1000_1599","1600_1999","2000_2999","gte3000","unknown"];
const BLABEL={lt1000:"〜1.0L","1000_1599":"1.0–1.6L","1600_1999":"1.6–2.0L","2000_2999":"2.0–3.0L",gte3000:"3.0L+",unknown:null};
function bucket(dc){if(dc==null)return "unknown";if(dc<1000)return "lt1000";if(dc<1600)return "1000_1599";if(dc<2000)return "1600_1999";if(dc<3000)return "2000_2999";return "gte3000";}
function blabel(b){return BLABEL[b]||t("unknown");}

function matches(c,skip){
 if(skip!=="co"&&F.co.size&&!F.co.has(c.co||""))return false;
 if(skip!=="mk"&&F.mk.size&&!F.mk.has(c.mk||""))return false;
 if(skip!=="dc"&&F.dc.size&&!F.dc.has(bucket(c.dc==null?null:c.dc)))return false;
 if(F.q){const h=(pick(c.n)+" "+(c.mk||"")).toLowerCase();if(!h.includes(F.q))return false;}
 return true;
}
function filtered(){return CARS.filter(c=>matches(c,null));}

function facetCounts(dim){const m=new Map();for(const c of CARS){if(!matches(c,dim))continue;
 let k=dim==="co"?(c.co||""):dim==="mk"?(c.mk||""):bucket(c.dc==null?null:c.dc);
 m.set(k,(m.get(k)||0)+1);}return m;}

function renderFacets(){
 // country
 let m=facetCounts("co");let q=(document.getElementById("fcoq").value||"").toLowerCase();
 let arr=[...m.entries()].sort((a,b)=>b[1]-a[1]);
 document.getElementById("fco").innerHTML=arr.filter(([k])=>!q||cname(k).toLowerCase().includes(q)||k.toLowerCase().includes(q)).slice(0,200).map(([k,n])=>
   `<div class="fitem ${F.co.has(k)?"on":""}" data-d="co" data-k="${esc(k)}"><span>${flag(k)} ${esc(cname(k))}</span><span class="c">${n}</span></div>`).join("");
 // maker
 m=facetCounts("mk");q=(document.getElementById("fmkq").value||"").toLowerCase();
 arr=[...m.entries()].sort((a,b)=>b[1]-a[1]);
 document.getElementById("fmk").innerHTML=arr.filter(([k])=>!q||(k||t("unknown")).toLowerCase().includes(q)).slice(0,300).map(([k,n])=>
   `<div class="fitem ${F.mk.has(k)?"on":""}" data-d="mk" data-k="${esc(k)}"><span>${esc(k||t("unknown"))}</span><span class="c">${n}</span></div>`).join("");
 // displacement
 m=facetCounts("dc");
 document.getElementById("fdc").innerHTML=BUCKETS.filter(b=>m.get(b)).map(b=>
   `<div class="fitem ${F.dc.has(b)?"on":""}" data-d="dc" data-k="${b}"><span>${esc(blabel(b))}</span><span class="c">${m.get(b)}</span></div>`).join("");
}

function renderChips(){
 const ch=[];
 F.co.forEach(k=>ch.push([`co`,k,`${flag(k)} ${cname(k)}`]));
 F.mk.forEach(k=>ch.push([`mk`,k,k||t("unknown")]));
 F.dc.forEach(k=>ch.push([`dc`,k,blabel(k)]));
 document.getElementById("chips").innerHTML=ch.map(([d,k,lab])=>`<span class="chip" data-d="${d}" data-k="${esc(k)}"><b>×</b> ${esc(lab)}</span>`).join("");
}

function card(c){
 const img=c.img?`<img class="thumb" loading="lazy" src="${esc(c.img)}" alt="${esc(pick(c.n))}">`:`<div class="noimg">🚗</div>`;
 const sub=[c.mk,c.co?flag(c.co):""].filter(Boolean).join(" · ");
 return `<div class="card" data-id="${esc(c.id)}">${img}<div class="cb"><div class="cn">${esc(pick(c.n))}</div><div class="cs">${esc(sub)} ${c.v?'<span class="badge ok">✓</span>':'<span class="badge no">?</span>'}</div></div></div>`;
}
function render(){
 const list=filtered();const pages=Math.max(1,Math.ceil(list.length/PS));if(page>=pages)page=0;
 const slice=list.slice(page*PS,page*PS+PS);
 document.getElementById("grid").innerHTML=slice.map(card).join("")||`<p class="count">${t("noData")}</p>`;
 document.getElementById("count").textContent=list.length.toLocaleString()+" "+t("results");
 document.getElementById("pager").innerHTML=pages>1?
   `<button id="prev" ${page===0?"disabled":""}>‹ ${t("prev")}</button><span class="count">${page+1} / ${pages}</span><button id="next" ${page>=pages-1?"disabled":""}>${t("next")} ›</button>`:"";
 renderChips();
}
function refresh(){renderFacets();render();}

function showDetail(id){
 const c=CARS.find(x=>x.id===id);if(!c)return;
 const yrs=c.ys?(c.ys+(c.ye?"–"+c.ye:"–")):"";
 const rows=[];const r=(l,v)=>{if(v!=null&&v!=="")rows.push(`<dt>${l}</dt><dd>${esc(v)}</dd>`);};
 r(t("fMaker"),c.mk);r(t("fCountry"),c.co?flag(c.co)+" "+cname(c.co):"");r("Years",yrs);
 r(t("fDisp"),c.dc?c.dc.toLocaleString()+" cc":"");r("Power",c.ps?c.ps.toLocaleString()+" PS":"");
 r("Torque",c.tq?c.tq.toLocaleString()+" N·m":"");r("Weight",c.kg?c.kg.toLocaleString()+" kg":"");
 r("0–100",c.s100?c.s100+" s":"");r("Body",c.bt);r("Drive",c.dr);
 let photo="";
 if(c.img){let cr=`📷 ${esc(c.art||"Unknown")} · ${esc(c.lic||"")}`;if(c.isrc)cr+=` · <a href="${esc(c.isrc)}" target="_blank" rel="noopener">Wikimedia</a>`;
   photo=`<img class="hero" src="${esc(c.img)}" alt=""><div class="credit">${cr}</div>`;}
 let src="";if(c.src&&c.src.length)src=`<div class="src">Sources: ${c.src.map((u,i)=>`<a href="${esc(u)}" target="_blank" rel="noopener">[${i+1}]</a>`).join("")}</div>`;
 document.getElementById("ovbox").innerHTML=`<span class="x" id="ovx">✕</span>${photo}<h2>${esc(pick(c.n))}</h2>
   <div>${c.v?'<span class="badge ok">✓ '+t("verified")+'</span>':'<span class="badge no">'+t("unverified")+'</span>'}</div>
   <p class="summary">${esc(pick(c.sm))}</p><dl class="specs">${rows.join("")}</dl>${src}`;
 document.getElementById("ov").classList.add("show");document.getElementById("ovx").onclick=closeDetail;
}
function closeDetail(){document.getElementById("ov").classList.remove("show");}

function applyLabels(){
 document.documentElement.lang=L;document.body.dir=(L==="ar")?"rtl":"ltr";
 document.getElementById("q").placeholder=t("search");
 document.getElementById("hCountry").textContent=t("fCountry");
 document.getElementById("hMaker").textContent=t("fMaker");
 document.getElementById("hDisp").textContent=t("fDisp");
 const setT=(id,k)=>{const e=document.getElementById(id);if(e)e.textContent=t(k);};
 setT("herosub","heroSub");setT("ctaSearchL","heroCtaSearch");setT("ctaRandomL","heroCtaRandom");
 setT("stCarsL","heroStCars");setT("stMakersL","heroStMakers");setT("stLangL","heroStLang");
}
document.addEventListener("click",e=>{
 const fi=e.target.closest(".fitem");if(fi){const d=fi.dataset.d,k=fi.dataset.k;F[d].has(k)?F[d].delete(k):F[d].add(k);page=0;refresh();return;}
 const ch=e.target.closest(".chip");if(ch){F[ch.dataset.d].delete(ch.dataset.k);page=0;refresh();return;}
 const sc=e.target.closest(".scard");if(sc){showDetail(sc.dataset.id);return;}
 const cd=e.target.closest(".card");if(cd){showDetail(cd.dataset.id);return;}
 if(e.target.id==="prev"){page--;render();window.scrollTo(0,0);}
 if(e.target.id==="next"){page++;render();window.scrollTo(0,0);}
 if(e.target.id==="ov"){closeDetail();}
 if(e.target.id==="mfac"){const f=document.getElementById("facets");f.style.display=f.style.display==="block"?"none":"block";}
});
function deb(fn,ms){let h;return function(){clearTimeout(h);h=setTimeout(fn,ms);};}
document.getElementById("q").addEventListener("input",deb(()=>{F.q=document.getElementById("q").value.trim().toLowerCase();page=0;refresh();},200));
document.getElementById("fcoq").addEventListener("input",deb(renderFacets,200));
document.getElementById("fmkq").addEventListener("input",deb(renderFacets,200));
document.getElementById("lang").addEventListener("change",e=>{L=e.target.value;applyLabels();refresh();});

function animateCount(el,to){if(!el)return;let s=null;function step(t){if(s===null)s=t;const p=Math.min((t-s)/1100,1);const e=1-Math.pow(1-p,3);el.textContent=Math.floor(to*e).toLocaleString();if(p<1)requestAnimationFrame(step);}requestAnimationFrame(step);}
function renderShowcase(){
 const top=CARS.filter(c=>c.img).sort((a,b)=>(b.v||0)-(a.v||0)).slice(0,18);
 const el=document.getElementById("showcase");if(!el)return;
 if(!top.length){el.innerHTML="";return;}
 const cards=top.concat(top).map(c=>`<div class="scard" data-id="${esc(c.id)}"><img loading="lazy" src="${esc(c.img)}" alt="${esc(pick(c.n))}">${c.v?`<span class="scnt">✓</span>`:""}<div class="scn">${esc(pick(c.n))}</div></div>`).join("");
 el.innerHTML=`<div class="showtrack">${cards}</div>`;
}
function initHeroBackdrop(){
 const el=document.getElementById("heroBackdrop");if(!el)return;
 const imgs=CARS.filter(c=>c.img).slice(0,6).map(c=>c.img);
 if(!imgs.length){el.innerHTML="";return;}
 el.innerHTML=imgs.map(u=>`<span class="herotile" style="background-image:url('${esc(u)}')"></span>`).join("");
}
function initHero(){
 animateCount(document.getElementById("stCars"),CARS.length);
 animateCount(document.getElementById("stMakers"),new Set(CARS.map(c=>c.mk).filter(Boolean)).size);
 animateCount(document.getElementById("stLang"),12);
 initHeroBackdrop();
 renderShowcase();
}
function goRandom(){const pool=CARS.filter(c=>c.img||c.v);if(!pool.length)return;const c=pool[Math.floor(Math.random()*pool.length)];showDetail(c.id);}
document.getElementById("ctaSearch").addEventListener("click",()=>{const q=document.getElementById("q");document.querySelector(".layout").scrollIntoView({behavior:"smooth",block:"start"});setTimeout(()=>q.focus(),350);});
document.getElementById("ctaRandom").addEventListener("click",goRandom);

const sel=document.getElementById("lang");sel.value="ja";L="ja";
fetch("data/cars.json").then(r=>r.json()).then(d=>{CARS=d;applyLabels();refresh();initHero();})
 .catch(e=>{document.getElementById("grid").innerHTML="<p class=count>データ読み込みに失敗しました（ローカルでは python3 -m http.server で開いてください）</p>";});
</script>
<footer>World Car Encyclopedia · 写真: Wikimedia Commons（各ライセンスは画像詳細/出典を参照）· データ出典付き</footer>
</body></html>
